<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: black;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .pixel-text {
            font-size: 3rem;
            text-shadow: 0 0 10px #00ff00;
            transition: color 0.3s ease;
        }
        .active {
            color: #00ff00;
        }
    </style>
</head>
<body>

    <div id="display" class="pixel-text">HELLO WORLD</div>

    <script>
        // 1. Keep screen awake
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                    console.log("Wake Lock active!");
                }
            } catch (err) { console.warn(err); }
        }
        document.addEventListener('click', requestWakeLock);

        // 2. Connect to ntfy.sh public websocket pool
        // Change "my-unique-pixel-display" to anything completely random if you want privacy!
        const socket = new WebSocket('wss://ntfy.sh/my-unique-pixel-display/ws');

        socket.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Only trigger if it is a valid message event
            if (data.event === "message") {
                const displayEl = document.getElementById('display');
                
                // Set text to whatever you sent via Postman
                displayEl.innerText = data.message.toUpperCase();
                displayEl.classList.add('active');

                // Fade back to black after 5 seconds
                setTimeout(() => {
                    displayEl.classList.remove('active');
                }, 5000);
            }
        };
    </script>
</body>
</html>
