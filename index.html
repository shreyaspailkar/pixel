<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: black; /* Hidden by default */
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .pixel-text {
            font-size: 3rem;
            text-shadow: 0 0 10px #00ff00;
            transition: color 0.3s ease;
        }
        .active {
            color: #00ff00; /* Neon Green when active */
        }
    </style>
</head>
<body>

    <div id="display" class="pixel-text">HELLO WORLD</div>

    <script src="https://unpkg.com/piesocket-js@5"></script>
    <script>
        // 1. Keep the iPhone screen from dimming/sleeping
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                    console.log("Wake Lock active! Screen won't sleep.");
                }
            } catch (err) {
                console.warn("Wake lock failed. Requires user interaction first.");
            }
        }
        
        // Trigger wake lock on the first screen tap
        document.addEventListener('click', requestWakeLock);

        // 2. Connect to a free test WebSocket channel
        // (Using PieSocket's public demo API key)
        const pieSocket = new PieSocket.default({
            clusterId: "demo",
            apiKey: "oCdGGAwcounter6wu8g6v8eunvsc68wACmG40gnoas4oj7MDUjY" 
        });

        const channel = pieSocket.subscribe("iphone-pixel-display");

        // 3. Listen for the API event
        channel.on("notification", (data) => {
            const displayEl = document.getElementById('display');
            
            // Change text to the API payload, or default to Hello World
            displayEl.innerText = data.text || "HELLO WORLD";
            displayEl.classList.add('active');

            // Hide it again after 5 seconds (turn screen back to black)
            setTimeout(() => {
                displayEl.classList.remove('active');
            }, 5000);
        });
    </script>
</body>
</html>
